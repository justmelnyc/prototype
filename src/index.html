<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prototype</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    .loading {
      opacity: 0;
      position: fixed;
      height: 100%;
      width: 100%;
      background: #272c33;
      padding-top: 25vh;
      text-align: center;
      z-index: -1;
      transition: opacity .8s ease-out;
    }
    app-root:empty + .loading {
      opacity: 1;
      z-index: 100;

    }
    #load {
      font-family: "courier", monospace;
      color: #EEE;
      margin-bottom: 50px;
    }
  </style>
</head>
<body>
  <root></root>
  <div class="loading">
    <h1 id="load">~$ bootstrapping Framework Prototype</h1>
  </div>
</body>
</html>
